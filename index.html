<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Site Prep Pipeline Dashboard</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f5f5f5; color: #333; }
.header { background: #232f3e; color: #fff; padding: 20px 30px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
.header h1 { font-size: 1.6rem; font-weight: 600; }
.header .date { color: #aaa; font-size: 0.9rem; }
.container { max-width: 1400px; margin: 0 auto; padding: 20px; }
.card { background: #fff; border-radius: 8px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
.card h2 { font-size: 1.1rem; color: #232f3e; margin-bottom: 15px; padding-bottom: 8px; border-bottom: 2px solid #ff9900; }
.kpi-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; }
.kpi { background: #fff; border-radius: 8px; padding: 20px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.08); border-top: 3px solid #ff9900; }
.kpi .value { font-size: 2.2rem; font-weight: 700; color: #232f3e; }
.kpi .label { font-size: 0.85rem; color: #666; margin-top: 5px; }
table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.9rem; }
th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid #e0e0e0; }
th { background: #232f3e; color: #fff; font-weight: 600; }
tr:hover { background: #f9f9f9; }
.bar-container { display: flex; align-items: center; margin: 6px 0; }
.bar-label { width: 220px; font-size: 0.85rem; text-align: right; padding-right: 10px; flex-shrink: 0; }
.bar-wrapper { flex: 1; background: #e0e0e0; border-radius: 4px; height: 24px; position: relative; overflow: hidden; }
.bar { height: 100%; border-radius: 4px; transition: width 0.3s; display: flex; align-items: center; justify-content: flex-end; padding-right: 6px; font-size: 0.75rem; color: #fff; font-weight: 600; }
.bar-nd { background: #1565c0; }
.bar-lob { background: #ff9900; }
.bar-default { background: #ff9900; }
.bar-accent { background: #232f3e; }
.bar-value { margin-left: 8px; font-size: 0.85rem; color: #333; width: 50px; flex-shrink: 0; }
.legend { display: flex; gap: 20px; margin: 10px 0; font-size: 0.85rem; }
.legend-item { display: flex; align-items: center; gap: 5px; }
.legend-color { width: 14px; height: 14px; border-radius: 3px; }
.tabs { display: flex; gap: 0; margin-bottom: 0; }
.tab-btn { padding: 10px 20px; background: #e0e0e0; border: none; cursor: pointer; font-size: 0.9rem; border-radius: 5px 5px 0 0; }
.tab-btn.active { background: #ff9900; color: #fff; font-weight: 600; }
.tab-content { display: none; }
.tab-content.active { display: block; }
.funnel-bar { margin: 8px 0; }
.funnel-label { font-size: 0.85rem; margin-bottom: 3px; }
.funnel-track { background: #e0e0e0; border-radius: 4px; height: 30px; position: relative; }
.funnel-fill { height: 100%; border-radius: 4px; display: flex; align-items: center; padding-left: 10px; font-size: 0.8rem; color: #fff; font-weight: 600; }
.stacked-bar { display: flex; height: 28px; border-radius: 4px; overflow: hidden; margin: 6px 0; }
.hidden { display: none; }
#dashboard { display: block; }
.donut-container { display: flex; align-items: center; gap: 30px; flex-wrap: wrap; }
.donut-stats { font-size: 0.9rem; }
.donut-stats div { margin: 4px 0; }
@media (max-width: 768px) { .kpi-row { grid-template-columns: 1fr 1fr; } .bar-label { width: 120px; } }
</style>
</head>
<body>
<div class="header">
<div>
<h1>&#128295; Site Prep Pipeline Dashboard</h1>
<div class="date">Generated: <span id="genDate"></span></div>
</div>
<div style="flex-shrink:0;">
<button onclick="loadCSV()" style="background:#ff9900;color:#232f3e;padding:8px 16px;border-radius:4px;font-weight:bold;font-size:12px;border:none;cursor:pointer;">&#128260; Refresh</button>
</div>
</div>
<div class="container">

<div id="dashboard">
<!-- KPI Cards -->
<div class="kpi-row" id="kpiRow"></div>
<!-- Pipeline Split -->
<div class="card" id="pipelineSplit"><h2>Pipeline Split: New Development vs Location Onboarding</h2><div id="pipelineContent"></div></div>
<!-- Location Onboarding Aging -->
<div class="card" id="agingCard"><h2>Location Onboarding Aging</h2><div id="agingContent"></div></div>
<!-- Upcoming Completions -->
<div class="card" id="upcomingCard"><h2>Upcoming Completions - Next 4 Weeks</h2><div id="upcomingContent"></div></div>
<!-- Quarterly Forecast -->
<div class="card" id="quarterlyCard"><h2>Quarterly Completion Forecast</h2><div id="quarterlyContent"></div></div>
<!-- Unit Data Verification -->
<div class="card" id="unitDataCard"><h2>Unit Data Verification</h2><div id="unitDataContent"></div></div>
<!-- Owner Workload -->
<div class="card" id="ownerCard"><h2>Owner Workload</h2><div id="ownerContent"></div></div>
<!-- Complexity Analysis -->
<div class="card" id="complexityCard"><h2>Complexity Analysis</h2><div id="complexityContent"></div></div>
<!-- Escalation & Risk Flags -->
<div class="card" id="escalationCard"><h2>Escalation &amp; Risk Flags</h2><div id="escalationContent"></div></div>
</div>
</div>
<script>
const TODAY = new Date(2026, 6, 22); // July 22, 2026

const EXCLUDED_STATUSES = ['Received raw info from client', 'Uploaded info to Amazon systems'];


function parseDate(str) {
    if (!str) return null;
    const parts = str.split('/');
    if (parts.length !== 3) return null;
    const m = parseInt(parts[0]) - 1;
    const d = parseInt(parts[1]);
    const y = parseInt(parts[2]);
    if (isNaN(m) || isNaN(d) || isNaN(y)) return null;
    return new Date(y, m, d);
}
function buildDashboard(data) {
    document.getElementById('dashboard').style.display = 'block';
    buildKPIs(data);
    buildPipelineSplit(data);
    buildAging(data);
    buildUpcoming(data);
    buildQuarterly(data);
    buildUnitData(data);
    buildOwnerWorkload(data);
    buildComplexity(data);
    buildEscalation(data);
}

function buildKPIs(data) {
    const total = data.length;
    const newDev = data.filter(r => r['Case Record Type'] === 'New Development Onboarding').length;
    const lob = data.filter(r => r['Case Record Type'] === 'Location Onboarding').length;
    const spvCompleted = data.filter(r => r['SPV Status'] === 'SPV completed').length;
    const noETA = data.filter(r => !r['Estimated Host Site Prep Completion Date']).length;
    
    const kpis = [
        { value: total, label: 'Total Cases' },
        { value: newDev, label: 'New Development Onboarding' },
        { value: lob, label: 'Location Onboarding' },
        { value: spvCompleted, label: 'SPV Completed' },
        { value: noETA, label: 'Cases with No ETA' }
    ];
    
    document.getElementById('kpiRow').innerHTML = kpis.map(k => 
        `<div class="kpi"><div class="value">${k.value}</div><div class="label">${k.label}</div></div>`
    ).join('');
}

function buildPipelineSplit(data) {
    const filtered = data.filter(r => !EXCLUDED_STATUSES.includes(r['Site prep verification status']));
    const ndData = filtered.filter(r => r['Case Record Type'] === 'New Development Onboarding');
    const lobData = filtered.filter(r => r['Case Record Type'] === 'Location Onboarding');
    
    const ndTotal = ndData.length;
    const lobTotal = lobData.length;
    const grandTotal = ndTotal + lobTotal;
    
    const ndStatuses = {};
    ndData.forEach(r => { const s = r['Site prep verification status'] || 'Unknown'; ndStatuses[s] = (ndStatuses[s]||0)+1; });
    const lobStatuses = {};
    lobData.forEach(r => { const s = r['Site prep verification status'] || 'Unknown'; lobStatuses[s] = (lobStatuses[s]||0)+1; });
    
    let html = `<div class="donut-container">`;
    html += `<div style="flex:1;min-width:300px;">`;
    // Stacked bar for pipeline split
    const ndPct = grandTotal ? (ndTotal/grandTotal*100).toFixed(1) : 0;
    const lobPct = grandTotal ? (lobTotal/grandTotal*100).toFixed(1) : 0;
    html += `<div style="margin-bottom:15px;"><strong>Pipeline Distribution</strong> (excl. Received raw info & Uploaded to Amazon)</div>`;
    html += `<div class="stacked-bar" style="height:36px;">`;
    html += `<div class="bar-nd" style="width:${ndPct}%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:0.8rem;">${ndTotal} (${ndPct}%)</div>`;
    html += `<div class="bar-lob" style="width:${lobPct}%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:0.8rem;">${lobTotal} (${lobPct}%)</div>`;
    html += `</div>`;
    html += `<div class="legend"><div class="legend-item"><div class="legend-color" style="background:#1565c0;"></div>New Development (${ndTotal})</div><div class="legend-item"><div class="legend-color" style="background:#ff9900;"></div>Location Onboarding (${lobTotal})</div></div>`;
    html += `</div>`;
    html += `</div>`;
    
    // Sub-breakdowns
    html += `<div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:15px;">`;
    html += `<div><strong>New Development by Status</strong>`;
    html += buildStatusTable(ndStatuses, ndTotal);
    html += `</div><div><strong>Location Onboarding by Status</strong>`;
    html += buildStatusTable(lobStatuses, lobTotal);
    html += `</div></div>`;
    
    document.getElementById('pipelineContent').innerHTML = html;
}

function buildStatusTable(statusMap, total) {
    const sorted = Object.entries(statusMap).sort((a,b) => b[1]-a[1]);
    let html = `<table><tr><th>Status</th><th>Count</th><th>%</th></tr>`;
    sorted.forEach(([s, c]) => {
        html += `<tr><td>${s}</td><td>${c}</td><td>${total?(c/total*100).toFixed(1):'0'}%</td></tr>`;
    });
    html += `</table>`;
    return html;
}
function buildAging(data) {
    const lobData = data.filter(r => r['Case Record Type'] === 'Location Onboarding');
    const buckets = [
        { label: '0-30 days', min: 0, max: 30, count: 0 },
        { label: '31-60 days', min: 31, max: 60, count: 0 },
        { label: '61-90 days', min: 61, max: 90, count: 0 },
        { label: '90+ days', min: 91, max: Infinity, count: 0 }
    ];
    
    lobData.forEach(r => {
        const age = parseInt(r['Current Status Age(Days)']);
        if (isNaN(age)) return;
        for (const b of buckets) {
            if (age >= b.min && age <= b.max) { b.count++; break; }
        }
    });
    
    const total = buckets.reduce((s, b) => s + b.count, 0);
    const maxCount = Math.max(...buckets.map(b => b.count), 1);
    
    let html = `<table><tr><th>Age Bucket</th><th>Count</th><th>Percentage</th></tr>`;
    buckets.forEach(b => {
        html += `<tr><td>${b.label}</td><td>${b.count}</td><td>${total?(b.count/total*100).toFixed(1):'0'}%</td></tr>`;
    });
    html += `</table>`;
    
    html += `<div style="margin-top:15px;">`;
    buckets.forEach(b => {
        const pct = (b.count / maxCount * 100).toFixed(1);
        html += `<div class="bar-container"><div class="bar-label">${b.label}</div><div class="bar-wrapper"><div class="bar bar-lob" style="width:${pct}%">${b.count}</div></div><div class="bar-value">${total?(b.count/total*100).toFixed(1):'0'}%</div></div>`;
    });
    html += `</div>`;
    
    document.getElementById('agingContent').innerHTML = html;
}

function buildUpcoming(data) {
    const weeks = [
        { label: 'Week 1: Jul 22-28', start: new Date(2026,6,22), end: new Date(2026,6,28), count: 0 },
        { label: 'Week 2: Jul 29-Aug 4', start: new Date(2026,6,29), end: new Date(2026,7,4), count: 0 },
        { label: 'Week 3: Aug 5-11', start: new Date(2026,7,5), end: new Date(2026,7,11), count: 0 },
        { label: 'Week 4: Aug 12-18', start: new Date(2026,7,12), end: new Date(2026,7,18), count: 0 }
    ];
    
    data.forEach(r => {
        const d = parseDate(r['Estimated Host Site Prep Completion Date']);
        if (!d) return;
        for (const w of weeks) {
            if (d >= w.start && d <= w.end) { w.count++; break; }
        }
    });
    
    const maxCount = Math.max(...weeks.map(w => w.count), 1);
    let html = `<table><tr><th>Week</th><th>Expected Completions</th></tr>`;
    weeks.forEach(w => { html += `<tr><td>${w.label}</td><td>${w.count}</td></tr>`; });
    html += `</table>`;
    
    html += `<div style="margin-top:15px;">`;
    weeks.forEach(w => {
        const pct = (w.count / maxCount * 100).toFixed(1);
        html += `<div class="bar-container"><div class="bar-label">${w.label}</div><div class="bar-wrapper"><div class="bar bar-default" style="width:${pct}%">${w.count}</div></div><div class="bar-value">${w.count}</div></div>`;
    });
    html += `</div>`;
    
    document.getElementById('upcomingContent').innerHTML = html;
}
function buildQuarterly(data) {
    const quarters = [
        { label: 'Q3 2026 (Jul-Sep)', start: new Date(2026,6,1), end: new Date(2026,8,30) },
        { label: 'Q4 2026 (Oct-Dec)', start: new Date(2026,9,1), end: new Date(2026,11,31) },
        { label: 'Q1 2027 (Jan-Mar)', start: new Date(2027,0,1), end: new Date(2027,2,31) },
        { label: 'Q2 2027 (Apr-Jun)', start: new Date(2027,3,1), end: new Date(2027,5,30) },
        { label: 'Q3 2027+', start: new Date(2027,6,1), end: new Date(2099,11,31) }
    ];
    
    quarters.forEach(q => { q.nd = 0; q.lob = 0; });
    
    data.forEach(r => {
        const d = parseDate(r['Estimated Host Site Prep Completion Date']);
        if (!d) return;
        for (const q of quarters) {
            if (d >= q.start && d <= q.end) {
                if (r['Case Record Type'] === 'New Development Onboarding') q.nd++;
                else if (r['Case Record Type'] === 'Location Onboarding') q.lob++;
                break;
            }
        }
    });
    
    const maxTotal = Math.max(...quarters.map(q => q.nd + q.lob), 1);
    
    let html = `<div class="legend"><div class="legend-item"><div class="legend-color" style="background:#1565c0;"></div>New Development</div><div class="legend-item"><div class="legend-color" style="background:#ff9900;"></div>Location Onboarding</div></div>`;
    html += `<table><tr><th>Quarter</th><th>New Dev</th><th>LOB</th><th>Total</th></tr>`;
    quarters.forEach(q => { html += `<tr><td>${q.label}</td><td>${q.nd}</td><td>${q.lob}</td><td>${q.nd+q.lob}</td></tr>`; });
    html += `</table>`;
    
    html += `<div style="margin-top:15px;">`;
    quarters.forEach(q => {
        const total = q.nd + q.lob;
        const ndPct = (q.nd / maxTotal * 100).toFixed(1);
        const lobPct = (q.lob / maxTotal * 100).toFixed(1);
        html += `<div class="bar-container"><div class="bar-label">${q.label}</div><div class="bar-wrapper"><div class="stacked-bar" style="height:24px;width:100%;">`;
        html += `<div class="bar-nd" style="width:${ndPct}%;"></div>`;
        html += `<div class="bar-lob" style="width:${lobPct}%;"></div>`;
        html += `</div></div><div class="bar-value">${total}</div></div>`;
    });
    html += `</div>`;
    
    document.getElementById('quarterlyContent').innerHTML = html;
}

function buildUnitData(data) {
    const counts = {};
    data.forEach(r => {
        const s = r['Resident and unit information'] || 'Unknown';
        counts[s] = (counts[s] || 0) + 1;
    });
    
    const sorted = Object.entries(counts).sort((a, b) => b[1] - a[1]);
    const maxCount = Math.max(...sorted.map(([,c]) => c), 1);
    const total = data.length;
    
    let html = '<table><tr><th>Unit Data Status</th><th>Count</th><th>%</th></tr>';
    sorted.forEach(([s, c]) => {
        html += `<tr><td>${s}</td><td>${c}</td><td>${(c/total*100).toFixed(1)}%</td></tr>`;
    });
    html += '</table>';
    
    html += '<div style="margin-top:15px;">';
    const bgColors = ['#232f3e', '#1565c0', '#ff9900', '#388e3c', '#78909c', '#d32f2f'];
    sorted.forEach(([s, c], idx) => {
        const pct = (c / maxCount * 100).toFixed(1);
        const color = bgColors[idx % bgColors.length];
        html += `<div class="bar-container"><div class="bar-label">${s}</div><div class="bar-wrapper"><div class="bar" style="width:${pct}%;background:${color};">${c}</div></div><div class="bar-value">${(c/total*100).toFixed(1)}%</div></div>`;
    });
    html += '</div>';
    
    document.getElementById('unitDataContent').innerHTML = html;
}
function buildOwnerWorkload(data) {
    const owners = {};
    data.forEach(r => {
        const owner = r['Opportunity Owner'] || 'Unknown';
        if (!owners[owner]) owners[owner] = { total: 0, lob: 0, nd: 0, over90: 0, ages: [] };
        owners[owner].total++;
        if (r['Case Record Type'] === 'Location Onboarding') owners[owner].lob++;
        else if (r['Case Record Type'] === 'New Development Onboarding') owners[owner].nd++;
        const age = parseInt(r['Current Status Age(Days)']);
        if (!isNaN(age)) {
            owners[owner].ages.push(age);
            if (age > 90) owners[owner].over90++;
        }
    });
    
    const sorted = Object.entries(owners).sort((a,b) => b[1].total - a[1].total);
    
    let html = `<table><tr><th>Owner</th><th>Total</th><th>LOB</th><th>New Dev</th><th>90+ Day Cases</th><th>Avg Age</th></tr>`;
    sorted.forEach(([name, d]) => {
        const avg = d.ages.length ? (d.ages.reduce((s,v) => s+v, 0) / d.ages.length).toFixed(0) : '-';
        html += `<tr><td>${name}</td><td>${d.total}</td><td>${d.lob}</td><td>${d.nd}</td><td>${d.over90}</td><td>${avg}</td></tr>`;
    });
    html += `</table>`;
    
    document.getElementById('ownerContent').innerHTML = html;
}

function buildComplexity(data) {
    const complexities = {};
    data.forEach(r => {
        const c = r['Site Prep Complexity'] || 'Unknown';
        if (!complexities[c]) complexities[c] = { count: 0, ages: [] };
        complexities[c].count++;
        const age = parseInt(r['Current Status Age(Days)']);
        if (!isNaN(age)) complexities[c].ages.push(age);
    });
    
    const complexityOrder = ['4 - New property under construction', '3 - Complex renovation', '2 - Basic renovation', '1 - Electrical or internet wiring', '0 - No Site Preparation', 'Unknown'];
    const sorted = Object.entries(complexities).sort((a,b) => {
        const ai = complexityOrder.indexOf(a[0]);
        const bi = complexityOrder.indexOf(b[0]);
        return (ai === -1 ? 999 : ai) - (bi === -1 ? 999 : bi);
    });
    const maxCount = Math.max(...sorted.map(([,d]) => d.count), 1);
    
    let html = `<table><tr><th>Complexity</th><th>Count</th><th>Avg Age (Days)</th></tr>`;
    sorted.forEach(([name, d]) => {
        const avg = d.ages.length ? (d.ages.reduce((s,v) => s+v, 0) / d.ages.length).toFixed(0) : '-';
        html += `<tr><td>${name}</td><td>${d.count}</td><td>${avg}</td></tr>`;
    });
    html += `</table>`;
    
    html += `<div style="margin-top:15px;">`;
    sorted.forEach(([name, d]) => {
        const pct = (d.count / maxCount * 100).toFixed(1);
        html += `<div class="bar-container"><div class="bar-label">${name}</div><div class="bar-wrapper"><div class="bar bar-accent" style="width:${pct}%">${d.count}</div></div><div class="bar-value">${d.count}</div></div>`;
    });
    html += `</div>`;
    
    document.getElementById('complexityContent').innerHTML = html;
}
function buildEscalation(data) {
    // Overdue: completion date < today AND status != SPV completed
    const overdue = data.filter(r => {
        const d = parseDate(r['Estimated Host Site Prep Completion Date']);
        return d && d < TODAY && r['SPV Status'] !== 'SPV completed';
    });
    
    // No ETA: Cases with blank completion date
    const noEtaLob = data.filter(r => 
        !r['Estimated Host Site Prep Completion Date']
    );
    
    // Unresponsive: host comments contain "unresponsive"
    const unresponsive = data.filter(r => 
        (r['Site verif: Host comments'] || '').toLowerCase().includes('unresponsive')
    );
    
    let html = `<div class="tabs">`;
    html += `<button class="tab-btn active" onclick="switchTab(event, 'tabOverdue')">Overdue (${overdue.length})</button>`;
    html += `<button class="tab-btn" onclick="switchTab(event, 'tabNoEta')">No ETA (${noEtaLob.length})</button>`;
    html += `<button class="tab-btn" onclick="switchTab(event, 'tabUnresponsive')">Unresponsive (${unresponsive.length})</button>`;
    html += `</div>`;
    
    html += `<div class="tab-content active" id="tabOverdue">${buildEscalationTable(overdue)}</div>`;
    html += `<div class="tab-content" id="tabNoEta">${buildEscalationTable(noEtaLob)}</div>`;
    html += `<div class="tab-content" id="tabUnresponsive">${buildEscalationTable(unresponsive)}</div>`;
    
    document.getElementById('escalationContent').innerHTML = html;
}

function buildEscalationTable(rows) {
    if (rows.length === 0) return '<p style="padding:15px;color:#666;">No cases found.</p>';
    let html = `<div style="max-height:400px;overflow-y:auto;"><table><tr><th>Case Number</th><th>Account Name</th><th>Owner</th><th>Record Type</th><th>Age (Days)</th></tr>`;
    const sorted = rows.sort((a,b) => (parseInt(b['Current Status Age(Days)'])||0) - (parseInt(a['Current Status Age(Days)'])||0));
    sorted.forEach(r => {
        const rt = r['Case Record Type'] === 'New Development Onboarding' ? 'New Dev' : 'LOB';
        html += `<tr><td>${r['Case Number']||''}</td><td>${r['Account Name']||''}</td><td>${r['Opportunity Owner']||''}</td><td>${rt}</td><td>${r['Current Status Age(Days)']||''}</td></tr>`;
    });
    html += `</table></div>`;
    return html;
}

function switchTab(event, tabId) {
    const card = event.target.closest('.card');
    card.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    card.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    event.target.classList.add('active');
    document.getElementById(tabId).classList.add('active');
